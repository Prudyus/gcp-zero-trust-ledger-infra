###############################################################################
# build-pipeline.yaml — CI for the ledger-api container image
#
# Flow:
#   PR            → lint + build + Trivy scan. ZERO GCP credentials, no push
#                   (the WIF bindings in workload-identity.tf only admit
#                   refs/heads/main and tag refs — PRs cannot mint tokens).
#   push to main  → build → scan → push :sha-<sha12> to Artifact Registry
#                   (repo `images`; immutable tags) → cosign keyless sign →
#                   bump the image tag in the ledger-api manifest via commit.
#   tag v*.*.*    → same, image tagged with the release version; bump lands
#                   on main.
#
# Auth: keyless Workload Identity Federation. google-github-actions/auth
# exchanges the GitHub OIDC token for a ~10-minute access token as the CI
# service account, whose ONLY power is artifactregistry.writer on the
# `images` repo. No exported keys exist anywhere in this pipeline.
#
# Deployment hand-off (deliberate, zero-trust): this pipeline DOES NOT
# kubectl. The GKE control plane is unreachable from GitHub-hosted runners
# (master authorized networks / private endpoint — Module 2). Rollout =
# an operator or in-VPC automation applying the bumped manifest:
#   kubectl apply -f kubernetes/apps/ledger-api/deployment.yaml
# Binary Authorization then admits the image only because it lives in this
# project's AR repo (ALWAYS_DENY + whitelist — Module 2). The cosign
# signature adds verifiable provenance on top:
#   cosign verify REGION-docker.pkg.dev/PROJ/images/ledger-api@sha256:… \
#     --certificate-identity-regexp 'https://github.com/acme/ledger-platform/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
#
# Loop prevention: the manifest-bump commit is pushed with GITHUB_TOKEN, and
# GitHub never triggers workflows from GITHUB_TOKEN pushes ([skip ci] in the
# message is belt-and-braces).
#
# Repo prerequisites (GitHub → Settings → Variables):
#   GCP_PROJECT_ID    e.g. acme-ledger-prod
#   GCP_REGION        e.g. us-central1
#   GCP_WIF_PROVIDER  full name from output `github_wif_provider`, i.e.
#                     projects/NNN/locations/global/workloadIdentityPools/
#                     ledger-github/providers/github-oidc
#   GCP_CI_SA         from output `ci_service_account_email`
#   If main is branch-protected: allow github-actions[bot] to bypass the
#   push restriction, or swap the bump job to a GitHub App token.
#   Recommended: pin all `uses:` refs to full commit SHAs via Renovate.
###############################################################################
name: build-pipeline

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

# Default: least privilege. Jobs elevate individually.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/images/ledger-api
  MANIFEST_FILE: kubernetes/apps/ledger-api/deployment.yaml

jobs:
  # ===========================================================================
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # ===========================================================================
  build:
    name: Build, scan, sign & push
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: lint
    permissions:
      contents: read
      id-token: write # OIDC: WIF token exchange + cosign keyless signing
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "image_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=sha-${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build once into the local daemon so Trivy gates BEFORE anything
      # reaches the registry. linux/amd64 only — the node pool is n2d/x86
      # Confidential VMs (Module 2).
      - name: Build image (local, for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: local/ledger-api:scan
          build-args: |
            VERSION=${{ steps.meta.outputs.image_tag }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Vulnerability gate (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: local/ledger-api:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: local/ledger-api:scan
          format: cyclonedx
          output: sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.meta.outputs.image_tag }}
          path: sbom.cdx.json
          retention-days: 90

      # ------------- push phase: refs/heads/main and refs/tags/v* only -----
      - name: Authenticate to Google Cloud (WIF)
        if: github.event_name == 'push'
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SA }}
          token_format: access_token
          access_token_lifetime: 600s

      - name: Login to Artifact Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # Same context + gha cache → layer-identical to the scanned build;
      # this call effectively only uploads. AR tag immutability means a
      # re-run of an identical ref fails loudly instead of repointing.
      - name: Push image
        if: github.event_name == 'push'
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            VERSION=${{ steps.meta.outputs.image_tag }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          provenance: false

      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      # Keyless signature by DIGEST (never by mutable ref); the Fulcio
      # certificate binds this exact repo+ref. Signature lands in AR next
      # to the image (docker credentials already in the keychain).
      - name: Sign image (cosign keyless)
        if: github.event_name == 'push'
        env:
          IMAGE_DIGEST_REF: ${{ env.IMAGE }}@${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE_DIGEST_REF}"

  # ===========================================================================
  update-manifest:
    name: Bump image tag in manifest
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: build
    permissions:
      contents: write
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
    steps:
      # Tag builds also land their bump on main — deploys track main.
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump image in ledger-api Deployment
        env:
          NEW_IMAGE: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail
          # Parenthesized-LHS assignment mutates the matching node while
          # passing ALL documents of the multi-doc manifest through intact.
          yq -i '(select(.kind == "Deployment")
                  | .spec.template.spec.containers[]
                  | select(.name == "ledger-api")
                  | .image) = strenv(NEW_IMAGE)' "${MANIFEST_FILE}"
          echo "--- resulting image line ---"
          grep -n "image: " "${MANIFEST_FILE}"

      - name: Commit and push (rebase-retry for concurrent merges)
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "${MANIFEST_FILE}"; then
            echo "Image already ${IMAGE_TAG} — nothing to commit."
            exit 0
          fi

          git add "${MANIFEST_FILE}"
          git commit -m "chore(deploy): ledger-api ${IMAGE_TAG} [skip ci]"

          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}) — rebasing on latest main."
            git pull --rebase origin main
            sleep $(( attempt * 3 ))
          done
          echo "::error::Failed to push manifest bump after 5 attempts."
          exit 1